    Set the levels of moderators to be used in `cond_indirect_effects()`
    and `cond_indirect()`.
- contents:
  - mod_levels
  - mod_levels_list
  - merge_mod_levels
- title: Bootstrapping
  desc: >
    Generate bootstrap estimates to be used
    by the main functions to form
    bootstrap confidence intervals
- contents:
  - do_boot
  - lm2boot_out
  - fit2boot_out
  - fit2boot_out_do_boot
- title: Monte Carlo

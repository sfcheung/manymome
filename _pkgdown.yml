destination: docs

url: https://sfcheung.github.io/manymome/

template:
  bootstrap: 5
  bootswatch: journal
  theme: a11y-light
  bslib:
    pkgdown-nav-height: 80px
    bg: "#EFEFEF"
    fg: "#000000"
    primary: "#01B0F1"
    link-color: "#0000A0"
    base_font: {google: "Hind"}
    heading_font: {google: "Hind"}
    code_font: {google: "Oxygen Mono"}
  includes:
    in_header: <meta name="google-site-verification" content="0VLBmFnW_UJFI-7gXnORPBsWxqZwmzuGpK-TeVRLBjQ" />

navbar:
  bg: primary
  structure:
    left:  [intro, articles, reference, tutorials, news]
    right: [search, github]

articles:

- title: Structural Equation Models
  navbar: Structural Equation Models
  contents:
  - manymome
  - med_lav
  - articles/mome_sam
  - articles/mo_sam

- title: Multiple Regression
  navbar: Multiple Regression
  contents:
  - med_lm
  - mome_lm

- title: All-In-One Functions
  navbar: All-In-One Functions
  contents:
  - articles/q_mediation
  - articles/q_mediation_sem_indicators_simple
  - articles/q_mediation_sem_indicators_parallel
  - articles/q_mediation_sem_indicators_serial
  - articles/q_mediation_sem_indicators_arbitrary

- title: Multigroup Models
  navbar: Multigroup Models
  contents:
  - articles/med_mg

- title: Multiple Imputation
  navbar: Multiple Imputation
  contents:
  - do_mc_lavaan_mi

- title: Helpers
  navbar: Helpers
  contents:
  - do_boot
  - do_mc
  - mod_levels

- title: Moderated Regression
  navbar: Moderated Regression
  contents:
  - articles/mo_lm
  - articles/mo_lm_2x1w
  - articles/mo_lm_2x2w
  - articles/mo_lm_cat_2w

- title: Technical Appendices
  contents:
  - articles/get_prod
  - articles/manymome_cond_indirect_and_friends_workflow
  - articles/manymome_do_boot_workflow
  - articles/manymome_do_mc_workflow

